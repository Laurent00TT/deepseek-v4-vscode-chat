name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npm run compile

      - name: ESLint
        run: npm run lint

      - name: vsce package (sanity check)
        run: npx @vscode/vsce package -o /tmp/extension.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix-${{ github.sha }}
          path: /tmp/extension.vsix
          retention-days: 7
